name: Security

# Automated security scans. Runs on every push / PR to main, plus a weekly
# cron so newly disclosed CVEs in pinned deps surface even when nobody
# pushes. All jobs are non-blocking by default (continue-on-error) EXCEPT
# the secret scan and the high/critical npm audit gate — leaking a key or
# shipping a known-exploitable dep should fail the build outright.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — catches new CVEs in unchanged lockfiles.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for CodeQL & Trivy SARIF upload
  actions: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Dependency vulnerabilities — fails the build on high/critical findings.
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Audit (high+ fails the job)
        run: bun audit --audit-level=high

  # ---------------------------------------------------------------------------
  # SAST — GitHub's built-in CodeQL for JS/TS. Results land in the
  # repo's Security → Code scanning tab.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ---------------------------------------------------------------------------
  # Filesystem + dependency CVE scan via Trivy. Uploads SARIF so findings
  # appear alongside CodeQL in the Security tab.
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy (fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"   # report-only; gate is npm-audit
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  # ---------------------------------------------------------------------------
  # Secret scanning — fails the build if a key/token slips into a commit.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so PRs scan the diff range
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
